name: CMake on Linux (ARM64) 

on:
  #push:
 #  branches: [ $default-branch ]
  pull_request:
    branches: [ "LTS-C*"]

jobs:
  build:
    runs-on:   [self-hosted, linux, arm64]

    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations. 
      #Consider changing this to true when your workflow is stable.
      fail-fast: false

      matrix:         #host,cuda,cuda_version
        include:
          - host_compiler: "g++"            
            cuda_version: "12.9"
            cuda_compiler: "nvcc"
          - host_compiler: "clang++"     
            cuda_version: "12.9"
            cuda_compiler: "nvcc"
 
            
        # 
    steps:    
    - uses: actions/checkout@v4
    - name: Set reusable strings
      # Turn repeated input strings (such as the build output directory) into step outputs. These step outputs can be used throughout the workflow file.
      id: strings
      run: |      
          echo "build-output-dir=${{github.workspace}}/build" >> "$GITHUB_OUTPUT"        
    
    - name: Configure CMake      
      run: |         
        export PATH=/usr/lib/llvm-21/bin/:/home/cudeiro/cmake-4.2.1-linux-aarch64/bin/:/usr/local/cuda-${{matrix.cuda_version}}/bin:$PATH         
        export CUDACXX="${{matrix.cuda_compiler}}"
        export CC="${{matrix.host_compiler}}"
        export CXX="${{matrix.host_compiler}}"         
        #note CUDA ARCH is only needed for clang++ in cuda mode, nvcc can detect it automatically
        cmake -G "Ninja" -B ${{steps.strings.outputs.build-output-dir}} -DCMAKE_BUILD_TYPE="Release" -DCUDAToolkit_ROOT="/usr/local/cuda-${{matrix.cuda_version}}" -DCUDA_ARCH="87;" -S ${{github.workspace}}       
 
    - name: Build
      # Build your program with the given configuration. Note that --config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).      
      run: |                   
        export PATH=/usr/lib/llvm-21/bin/:/home/cudeiro/cmake-4.2.1-linux-aarch64/bin/:/usr/local/cuda-${{matrix.cuda_version}}/bin:$PATH         
        export CUDACXX="${{matrix.cuda_compiler}}"
        export CC="${{matrix.host_compiler}}"
        export CXX="${{matrix.host_compiler}}"                
        cmake --build ${{ steps.strings.outputs.build-output-dir }}  --config Release
                     
    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      # Execute tests defined by the CMake configuration. Note that --build-config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
      run: |         
        ctest --build-config Release --output-junit test_results.xml
